services:
  api:
    image: mcr.microsoft.com/dotnet/sdk:10.0
    working_dir: /src/API
    command: dotnet watch run --project API.csproj --no-launch-profile --non-interactive --urls http://+:8080
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      DOTNET_USE_POLLING_FILE_WATCHER: "1"
      DOTNET_WATCH_RESTART_ON_RUDE_EDIT: "1"
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=dungeoncompanion;Username=dungeon;Password=dungeon_dev
    volumes:
      - ./API:/src/API
      - ./Contracts:/src/Contracts
      - ./Data:/src/Data
      - ./DungeonCompanion.sln:/src/DungeonCompanion.sln
      - nuget_cache:/root/.nuget/packages
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dungeon

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: dungeoncompanion
      POSTGRES_USER: dungeon
      POSTGRES_PASSWORD: dungeon_dev
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dungeon -d dungeoncompanion"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dungeon

volumes:
  postgres_data:
  nuget_cache:

networks:
  dungeon:
